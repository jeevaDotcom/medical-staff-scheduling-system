<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login — MedSched System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }
  .login-box {
    width: 100%;
    max-width: 420px;
    padding: 40px;
    background: rgba(17, 24, 39, 0.7);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(212, 160, 23, 0.15);
    border-radius: 24px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    position: relative;
    z-index: 10;
    text-align: center;
    animation: fadeUp 0.8s ease-out;
  }
  .login-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 20px;
    background: linear-gradient(135deg, #1d4ed8, #2563eb);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
  }
  .login-box h2 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #ffffff, #c4c9d4);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .login-box p {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 30px;
  }
  .form-group {
    text-align: left;
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    margin-bottom: 8px;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text2);
  }
  .form-control {
    width: 100%;
    padding: 14px 18px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: all 0.3s ease;
  }
  .form-control:focus {
    border-color: var(--gold2);
    box-shadow: 0 0 0 4px rgba(212, 160, 23, 0.1);
    background: rgba(255, 255, 255, 0.06);
  }
  .btn-login {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
  }
  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 35px rgba(37, 99, 235, 0.45);
  }
  .error-msg {
    color: #f87171;
    font-size: 0.85rem;
    margin-bottom: 15px;
    display: none;
    padding: 10px;
    background: rgba(248, 113, 113, 0.1);
    border: 1px solid rgba(248, 113, 113, 0.2);
    border-radius: 8px;
  }
</style>
</head>
<body>
<div class="bg-mesh"></div>

<div class="login-box">
  <div class="login-icon">🏥</div>
  <h2>MedSched Portal</h2>
  <p>Sign in to manage staff schedules & attendance</p>

  <div class="error-msg" id="errorMsg">Invalid username or password</div>

  <form id="loginForm">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" class="form-control" placeholder="Enter username (admin)" required autofocus/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" class="form-control" placeholder="Enter password (admin123)" required/>
    </div>
    <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
  </form>
  
  <div style="margin-top: 25px; font-size: 0.75rem; color: var(--muted)">
    Default Credentials:<br/>
    Username: <strong>admin</strong> | Password: <strong>admin123</strong>
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');
  
  btn.textContent = 'Authenticating...';
  btn.style.opacity = '0.7';
  err.style.display = 'none';

  try {
    const res = await fetch('http://localhost:8080/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass })
    });
    
    if (res.ok) {
      const data = await res.json();
      localStorage.setItem('medsched_token', data.token);
      localStorage.setItem('medsched_user', data.username);
      window.location.href = 'index.html';
    } else {
      // Allow demo login if backend is offline or credentials match hardcoded fallback
      if (user === 'admin' && pass === 'admin123') {
        localStorage.setItem('medsched_token', 'demo-token');
        localStorage.setItem('medsched_user', 'Admin (Demo)');
        window.location.href = 'index.html';
      } else {
        throw new Error('Invalid credentials');
      }
    }
  } catch (error) {
    if (user === 'admin' && pass === 'admin123') {
      localStorage.setItem('medsched_token', 'demo-token');
      localStorage.setItem('medsched_user', 'Admin');
      window.location.href = 'index.html';
    } else {
      err.style.display = 'block';
      err.textContent = 'Invalid username or password';
      btn.textContent = 'Sign In';
      btn.style.opacity = '1';
    }
  }
});
</script>
</body>
</html>
